<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITCORE // Content Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#D6FF00', dark: '#0A0A0A', card: '#141414' },
                    fontFamily: { heading: ['Oswald', 'sans-serif'], body: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0A0A0A; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { background: #0A0A0A !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; outline: none; transition: border 0.3s; }
        input:focus, textarea:focus { border-color: #D6FF00 !important; }
        label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #666; margin-bottom: 6px; letter-spacing: 1px; font-weight: 600; }
        .btn-save { background: #D6FF00; color: black; font-weight: 800; padding: 10px 20px; border-radius: 8px; font-size: 0.8rem; transition: all 0.3s; }
        .btn-save:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(214, 255, 0, 0.3); }
    </style>
</head>
<body class="flex">

    <aside class="hidden md:flex w-72 flex-col fixed h-full border-r border-white/5 p-8 bg-card">
        <div class="font-heading text-2xl font-bold tracking-tighter mb-10">FIT<span class="text-primary">CORE</span> <span class="text-[10px] opacity-50">ADMIN</span></div>
        <nav class="space-y-2">
            <a href="#hero-editor" class="block p-3 hover:bg-white/5 rounded-xl transition text-gray-400 hover:text-primary">Hero Section</a>
            <a href="#image-editor" class="block p-3 hover:bg-white/5 rounded-xl transition text-gray-400 hover:text-primary">Site Images</a>
            <a href="#service-editor" class="block p-3 hover:bg-white/5 rounded-xl transition text-gray-400 hover:text-primary">Our Services</a>
            <a href="#stats-editor" class="block p-3 hover:bg-white/5 rounded-xl transition text-gray-400 hover:text-primary">Stats & Counters</a>
        </nav>
    </aside>

    <main class="flex-1 md:ml-72 p-6 md:p-12 pb-32">
        <header class="mb-12">
            <h1 class="font-heading text-5xl font-bold">SITE <span class="text-primary">EDITOR</span></h1>
            <p class="text-gray-500 mt-2">Update your landing page content in real-time.</p>
        </header>

        <section id="hero-editor" class="mb-16">
            <h3 class="font-heading text-2xl mb-6 flex items-center gap-3">
                <span class="w-2 h-8 bg-primary block"></span> Hero Header
            </h3>
            <div class="glass p-8 rounded-3xl grid grid-cols-1 gap-6">
                <div>
                    <label>Main Title (HTML Allowed)</label>
                    <textarea id="hero-title" rows="2"></textarea>
                </div>
                <div>
                    <label>Subtitle / Description</label>
                    <textarea id="hero-desc" rows="3"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label>CTA Button Text</label>
                        <input type="text" id="hero-cta">
                    </div>
                    <div class="flex items-end">
                        <button onclick="saveHero()" class="btn-save w-full">UPDATE HERO SECTION</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="image-editor" class="mb-16">
            <h3 class="font-heading text-2xl mb-6 flex items-center gap-3">
                <span class="w-2 h-8 bg-primary block"></span> Background Images
            </h3>
            <div class="glass p-8 rounded-3xl grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label>Hero Background URL</label>
                    <input type="text" id="img-hero" placeholder="https://unsplash.com/...">
                    <button onclick="saveImage('hero')" class="btn-save mt-4 w-full">SAVE HERO IMG</button>
                </div>
                <div>
                    <label>Parallax (Never Give Up) URL</label>
                    <input type="text" id="img-parallax" placeholder="https://unsplash.com/...">
                    <button onclick="saveImage('parallax')" class="btn-save mt-4 w-full">SAVE PARALLAX IMG</button>
                </div>
            </div>
        </section>

        <section id="service-editor" class="mb-16">
            <h3 class="font-heading text-2xl mb-6 flex items-center gap-3">
                <span class="w-2 h-8 bg-primary block"></span> Our Services Cards
            </h3>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="glass p-6 rounded-3xl">
                    <label class="text-primary">Service 1</label>
                    <input type="text" id="s1-title" class="mb-4" placeholder="Title">
                    <textarea id="s1-desc" rows="3" placeholder="Description"></textarea>
                    <button onclick="saveService(1)" class="btn-save mt-4 w-full">UPDATE CARD 1</button>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <label class="text-primary">Service 2</label>
                    <input type="text" id="s2-title" class="mb-4" placeholder="Title">
                    <textarea id="s2-desc" rows="3" placeholder="Description"></textarea>
                    <button onclick="saveService(2)" class="btn-save mt-4 w-full">UPDATE CARD 2</button>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <label class="text-primary">Service 3</label>
                    <input type="text" id="s3-title" class="mb-4" placeholder="Title">
                    <textarea id="s3-desc" rows="3" placeholder="Description"></textarea>
                    <button onclick="saveService(3)" class="btn-save mt-4 w-full">UPDATE CARD 3</button>
                </div>
            </div>
        </section>

        <section id="stats-editor" class="mb-16">
            <h3 class="font-heading text-2xl mb-6 flex items-center gap-3">
                <span class="w-2 h-8 bg-primary block"></span> Site Statistics
            </h3>
            <div class="glass p-8 rounded-3xl grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label>Trainers</label>
                    <input type="text" id="stat-trainers">
                </div>
                <div>
                    <label>Members</label>
                    <input type="text" id="stat-members">
                </div>
                <div>
                    <label>Programs</label>
                    <input type="text" id="stat-programs">
                </div>
                <div class="md:col-span-3">
                    <button onclick="saveStats()" class="btn-save w-full">UPDATE ALL STATS</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
            authDomain: "pinotp-d7ef5.firebaseapp.com",
            databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
            projectId: "pinotp-d7ef5",
            storageBucket: "pinotp-d7ef5.firebasestorage.app",
            messagingSenderId: "708458917827",
            appId: "1:708458917827:web:375de278577df0adcf9776"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Data
        function loadData() {
            db.ref('content').on('value', snap => {
                const data = snap.val() || {};
                // Hero
                document.getElementById('hero-title').value = data.hero?.title || "BUILD YOUR <br> <span class='text-outline'>PERFECT</span> BODY";
                document.getElementById('hero-desc').value = data.hero?.desc || "Transform your physique and mind...";
                document.getElementById('hero-cta').value = data.hero?.cta || "Get Started Free";
                // Images
                document.getElementById('img-hero').value = data.images?.hero || "";
                document.getElementById('img-parallax').value = data.images?.parallax || "";
                // Services
                document.getElementById('s1-title').value = data.services?.s1?.title || "Power Lifting";
                document.getElementById('s1-desc').value = data.services?.s1?.desc || "";
                document.getElementById('s2-title').value = data.services?.s2?.title || "Cardio Training";
                document.getElementById('s2-desc').value = data.services?.s2?.desc || "";
                document.getElementById('s3-title').value = data.services?.s3?.title || "Personal Training";
                document.getElementById('s3-desc').value = data.services?.s3?.desc || "";
            });

            db.ref('stats').on('value', snap => {
                const s = snap.val() || {};
                document.getElementById('stat-trainers').value = s.trainers || "50+";
                document.getElementById('stat-members').value = s.members || "970+";
                document.getElementById('stat-programs').value = s.programs || "30+";
            });
        }

        // Save Functions
        function saveHero() {
            db.ref('content/hero').update({
                title: document.getElementById('hero-title').value,
                desc: document.getElementById('hero-desc').value,
                cta: document.getElementById('hero-cta').value
            }).then(() => alert("Hero Updated!"));
        }

        function saveImage(type) {
            const url = document.getElementById(`img-${type}`).value;
            db.ref(`content/images/${type}`).set(url).then(() => alert("Image Updated!"));
        }

        function saveService(num) {
            db.ref(`content/services/s${num}`).update({
                title: document.getElementById(`s${num}-title`).value,
                desc: document.getElementById(`s${num}-desc`).value
            }).then(() => alert(`Service ${num} Updated!`));
        }

        function saveStats() {
            db.ref('stats').update({
                trainers: document.getElementById('stat-trainers').value,
                members: document.getElementById('stat-members').value,
                programs: document.getElementById('stat-programs').value
            }).then(() => alert("Stats Updated!"));
        }

        window.onload = loadData;
    </script>
</body>
</html>
